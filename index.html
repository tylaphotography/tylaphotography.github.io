<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;

}

}

}

    background:white;
    text-align:center;
    padding:15px;

nav a{
    text-decoration:none;
    color:#333;

}

    max-width:1100px;
    margin:auto;
    padding:60px 20px;
}

.about{
    text-align:center;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.gallery img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}

.contact{
    text-align:center;
}

button{
    background:black;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
