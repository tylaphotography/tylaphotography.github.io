<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session | Tyla Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#f7f2ff,#fff0f7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    padding:50px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#9a6bff;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:2px solid #e6ddff;
    border-radius:12px;
    font-size:1rem;
}

textarea{
    resize:vertical;
    min-height:120px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#b388ff,#ff9dd8);
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#9a6bff;
}
</style>

</head>

<body>

<div class="container">

```
<h1>Book Your Photography Session</h1>

<p class="subtitle">
    Fill out the form below and I'll contact you to confirm your session.
</p>

<form>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" required>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" required>
    </div>

    <div class="form-group">
        <label>Session Type</label>
        <select required>
            <option>Wedding</option>
            <option>Portrait</option>
            <option>Nature</option>
            <option>Pet Photography</option>
            <option>Family Session</option>
            <option>Other</option>
        </select>
    </div>

    <div class="form-group">
        <label>Preferred Date</label>
        <input type="date" required>
    </div>

    <div class="form-group">
        <label>Location</label>
        <input type="text">
    </div>

    <div class="form-group">
        <label>Tell Me About Your Session</label>
        <textarea></textarea>
    </div>

    <button type="submit">
        Request Booking
    </button>

</form>

<a href="index.html" class="back">← Back to Portfolio</a>
```

</div>

</body>
</html>
